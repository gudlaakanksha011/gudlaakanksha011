name: Update README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch top repos
        run: |
          curl -s https://api.github.com/users/gudlaakanksha011/repos \
          | jq -r 'sort_by(.stargazers_count) | reverse | .[:5] | .[] | "- [" + .name + "](" + .html_url + ")"' > repos.txt

      - name: Update README
        run: |
          START="<!--START_PROJECTS-->"
          END="<!--END_PROJECTS-->"

          awk -v start="$START" -v end="$END" '
          $0 ~ start {print; system("cat repos.txt"); skip=1; next}
          $0 ~ end {skip=0}
          !skip
          ' README.md > temp.md

          mv temp.md README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Auto update README" || echo "No changes"
          git push
