name: Update README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch top repos
        run: |
          curl -s https://api.github.com/users/gudlaakanksha011/repos \
          | jq -r 'sort_by(.stargazers_count) | reverse | .[:4] | .[] | .name' > repos.txt

      - name: Generate cards
        run: |
          echo "## 🚀 Auto Updated Projects" > projects.md
          echo '<div align="center">' >> projects.md

          while read repo; do
            echo "<a href=\"https://github.com/gudlaakanksha011/$repo\">" >> projects.md
            echo "<img src=\"https://github-readme-stats.vercel.app/api/pin/?username=gudlaakanksha011&repo=$repo&theme=radical\" />" >> projects.md
            echo "</a>" >> projects.md
          done < repos.txt

          echo '</div>' >> projects.md

      - name: Update README
        run: |
          START="<!--START_PROJECTS-->"
          END="<!--END_PROJECTS-->"

          awk -v start="$START" -v end="$END" '
          $0 ~ start {print; system("cat projects.md"); skip=1; next}
          $0 ~ end {skip=0}
          !skip
          ' README.md > temp.md

          mv temp.md README.md

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "Auto update project cards" || echo "No changes"
          git push
